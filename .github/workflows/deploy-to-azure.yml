name: Deploy to Azure Static Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload HTML to Azure Storage
        uses: azure/CLI@v1
        with:
          azcliversion: latest
          inlineScript: |
            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
              --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
              --destination '$web' \
              --source dist \
              --overwrite \
              --content-type 'text/html' \
              --pattern '*.html'

            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
              --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
              --destination '$web' \
              --source dist \
              --overwrite \
              --content-type 'text/css' \
              --pattern '*.css'

            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
              --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
              --destination '$web' \
              --source dist \
              --overwrite \
              --content-type 'application/javascript' \
              --pattern '*.js'

            az storage blob upload-batch \
              --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }} \
              --account-key ${{ secrets.AZURE_STORAGE_ACCOUNT_KEY }} \
              --destination '$web' \
              --source dist \
              --overwrite \
              --pattern 'assets/*'

      - name: Deployment complete
        run: |
          echo "Deployed to Azure Static Website"
          echo "URL: https://${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}.z16.web.core.windows.net/"
